<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>45-Maktab Elektron Kundalik</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Login va Panel Interfeyslari */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 24px; color: var(--primary); }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #ef4444; color: white; }

        .login-card { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 16px; }

        .grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: fit-content; }
        .sidebar ul { list-style: none; }
        .sidebar li { padding: 12px; cursor: pointer; border-radius: 6px; margin-bottom: 5px; font-weight: 500; }
        .sidebar li:hover, .sidebar li.active { background: #eef2ff; color: var(--primary); }
        
        .main-content { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .panel-section { display: none; }
        .panel-section.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #f1f5f9; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-admin { background: #fef3c7; color: #d97706; }
        .badge-teacher { background: #dcfce7; color: #15803d; }
        .badge-student { background: #e0f2fe; color: #0369a1; }
        
        .grade-input { width: 45px; padding: 5px; text-align: center; border: 1px solid var(--border); border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-block" class="login-card">
        <h2 style="margin-bottom: 20px; text-align: center; color: var(--primary);">Tizimga kirish</h2>
        <div id="login-error" style="color: red; margin-bottom: 10px; font-weight: 500;"></div>
        <div class="form-group">
            <label>Foydalanuvchi nomi (Login)</label>
            <input type="text" id="login-user" class="form-control" placeholder="admin yoki login">
        </div>
        <div class="form-group">
            <label>Parol</label>
            <input type="password" id="login-pass" class="form-control" placeholder="******">
        </div>
        <button class="btn btn-primary style-block" style="width: 100%;" onclick="handleLogin()">Kirish</button>
    </div>

    <div id="app-block" style="display: none;">
        <header>
            <div>
                <h1>45-Maktab E-Kundalik</h1>
                <p style="margin-top: 5px; color: #64748b;">Foydalanuvchi: <span id="user-display-name" style="font-weight: 600;">...</span> <span id="user-role-badge" class="badge"></span></p>
            </div>
            <button class="btn btn-danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
        </header>

        <div class="grid">
            <div class="sidebar">
                <ul id="sidebar-menu">
                    </ul>
            </div>

            <div class="main-content">
                <div id="sec-students" class="panel-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3>O'quvchilar boshqaruvi</h3>
                        <button class="btn btn-primary" onclick="openAddStudentModal()"><i class="fas fa-plus"></i> Yangi o'quvchi</button>
                    </div>
                    <table id="tbl-students">
                        <thead><tr><th>ID</th><th>F.I.SH</th><th>Sinf</th><th>Login</th><th>Parol</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div id="sec-teachers" class="panel-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3>O'qituvchilar boshqaruvi</h3>
                        <button class="btn btn-primary" onclick="openAddTeacherModal()"><i class="fas fa-plus"></i> Yangi o'qituvchi</button>
                    </div>
                    <table id="tbl-teachers">
                        <thead><tr><th>ID</th><th>F.I.SH</th><th>Fan</th><th>Login</th><th>Parol</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div id="sec-journal" class="panel-section">
                    <h3>Sinf jurnali (Kundalik baholar)</h3>
                    <div style="margin: 15px 0; display: flex; gap: 10px;">
                        <select id="journal-subject" class="form-control" style="max-width: 200px;"></select>
                        <input type="date" id="journal-date" class="form-control" style="max-width: 180px;">
                        <button class="btn btn-primary" onclick="loadJournal()">Jurnalni ochish</button>
                    </div>
                    <table id="tbl-journal" style="display: none;">
                        <thead><tr><th>O'quvchi F.I.SH</th><th>Baho</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div id="sec-diary" class="panel-section">
                    <h3>Mening kundalik daftarim</h3>
                    <table id="tbl-diary">
                        <thead><tr><th>Fanlar</th><th>Dushanba</th><th>Seshanba</th><th>Chorshanba</th><th>Payshanba</th><th>Juma</th><th>Shanba</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // RENDER INTERNETDA REAL VAQTDA ISHLAYDIGAN BACKEND LINKI:
    const API_BASE_URL = "https://maktab-api-iwov.onrender.com"; 

    let currentUser = null;

    // Sahifa yuklanganda sessiyani tekshirish
    window.onload = function() {
        const savedUser = localStorage.getItem('logged_user');
        if(savedUser) {
            currentUser = JSON.parse(savedUser);
            setupUI();
        }
    };

    async function handleLogin() {
        const login = document.getElementById('login-user').value;
        const password = document.getElementById('login-pass').value;
        const errDiv = document.getElementById('login-error');
        errDiv.innerText = "";

        try {
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });

            if(response.ok) {
                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem('logged_user', JSON.stringify(currentUser));
                setupUI();
            } else {
                const errData = await response.json();
                errDiv.innerText = errData.error || "Kirishda xatolik!";
            }
        } catch(e) {
            errDiv.innerText = "Serverga ulanishda xatolik yuz berdi!";
            console.error(e);
        }
    }

    function handleLogout() {
        localStorage.removeItem('logged_user');
        currentUser = null;
        document.getElementById('app-block').style.display = 'none';
        document.getElementById('login-block').style.display = 'block';
    }

    function setupUI() {
        document.getElementById('login-block').style.display = 'none';
        document.getElementById('app-block').style.display = 'block';
        document.getElementById('user-display-name').innerText = currentUser.name;
        
        const badge = document.getElementById('user-role-badge');
        badge.innerText = currentUser.role.toUpperCase();
        badge.className = `badge badge-${currentUser.role}`;

        buildMenu();
    }

    function buildMenu() {
        const menu = document.getElementById('sidebar-menu');
        menu.innerHTML = "";
        
        if(currentUser.role === 'admin') {
            menu.innerHTML += `<li onclick="showSection('students')" id="menu-students" class="active"><i class="fas fa-user-graduate"></i> O'quvchilar</li>`;
            menu.innerHTML += `<li onclick="showSection('teachers')" id="menu-teachers"><i class="fas fa-chalkboard-teacher"></i> O'qituvchilar</li>`;
            showSection('students');
            loadStudents();
            loadTeachers();
        } else if(currentUser.role === 'teacher') {
            menu.innerHTML += `<li onclick="showSection('journal')" id="menu-journal" class="active"><i class="fas fa-book"></i> Sinf Jurnali</li>`;
            showSection('journal');
            initTeacherSubjects();
        } else if(currentUser.role === 'student') {
            menu.innerHTML += `<li onclick="showSection('diary')" id="menu-diary" class="active"><i class="fas fa-address-book"></i> Kundalik</li>`;
            showSection('diary');
            loadStudentDiary();
        }
    }

    function showSection(secId) {
        document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.sidebar li').forEach(l => l.classList.remove('active'));
        
        document.getElementById(`sec-${secId}`).classList.add('active');
        const activeMenu = document.getElementById(`menu-${secId}`);
        if(activeMenu) activeMenu.classList.add('active');
    }

    // --- ADMIN PARCHALARI ---
    async function loadStudents() {
        const res = await fetch(`${API_BASE_URL}/students`);
        const data = await res.json();
        const tbody = document.querySelector('#tbl-students tbody');
        tbody.innerHTML = data.map(s => `<tr><td>${s.id}</td><td>${s.name}</td><td>${s.class}</td><td>${s.login}</td><td>${s.password}</td></tr>`).join('');
    }

    async function loadTeachers() {
        const res = await fetch(`${API_BASE_URL}/teachers`);
        const data = await res.json();
        const tbody = document.querySelector('#tbl-teachers tbody');
        tbody.innerHTML = data.map(t => `<tr><td>${t.id}</td><td>${t.name}</td><td>${t.subject}</td><td>${t.login}</td><td>${t.password}</td></tr>`).join('');
    }

    function openAddStudentModal() {
        const name = prompt("O'quvchi F.I.SH kiriting:");
        const s_class = prompt("Sinfni kiriting (masalan, 9-A):");
        const login = prompt("Tizim uchun yangi login kiriting:");
        const password = prompt("Parol kiriting:");
        
        if(name && s_class && login && password) {
            fetch(`${API_BASE_URL}/students`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, class: s_class, login, password })
            }).then(() => loadStudents());
        }
    }

    function openAddTeacherModal() {
        const name = prompt("O'qituvchi F.I.SH kiriting:");
        const subject = prompt("Dars beradigan fani:");
        const login = prompt("Login kiriting:");
        const password = prompt("Parol kiriting:");
        
        if(name && subject && login && password) {
            fetch(`${API_BASE_URL}/teachers`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, subject, login, password })
            }).then(() => loadTeachers());
        }
    }

    // --- O'QITUVCHI PARCHALARI ---
    function initTeacherSubjects() {
        const sel = document.getElementById('journal-subject');
        sel.innerHTML = `<option value="Informatika">Informatika</option><option value="Matematika">Matematika</option>`;
        document.getElementById('journal-date').valueAsDate = new Date();
    }

    async function loadJournal() {
        const sub = document.getElementById('journal-subject').value;
        const date = document.getElementById('journal-date').value;
        
        const resStudents = await fetch(`${API_BASE_URL}/students`);
        const students = await resStudents.json();
        
        const resGrades = await fetch(`${API_BASE_URL}/grades`);
        const grades = await resGrades.json();

        const tbody = document.querySelector('#tbl-journal tbody');
        tbody.innerHTML = "";

        students.forEach(st => {
            const currentGrade = grades.find(g => g.studentId == st.id && g.day == date && g.subject == sub);
            const val = currentGrade ? currentGrade.grade : "";
            
            tbody.innerHTML += `
                <tr>
                    <td>${st.name}</td>
                    <td><input type="text" class="grade-input" value="${val}" onchange="saveGrade(${st.id}, '${date}', '${sub}', this.value)"></td>
                </tr>`;
        });
        document.getElementById('tbl-journal').style.display = 'table';
    }

    async function saveGrade(studentId, day, subject, grade) {
        await fetch(`${API_BASE_URL}/grades`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studentId, day, subject, grade })
        });
    }

    // --- O'QUVCHI PARCHALARI ---
    async function loadStudentDiary() {
        const resGrades = await fetch(`${API_BASE_URL}/grades`);
        const grades = await resGrades.json();
        // O'quvchi o'ziga tegishli baholarni ko'radi... (Sodda mantiqiy model)
        const tbody = document.querySelector('#tbl-diary tbody');
        tbody.innerHTML = `<tr><td>Informatika</td><td>5</td><td></td><td>4</td><td></td><td>5</td><td></td></tr>`;
    }
</script>
</body>
</html>
